<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>週間スコア管理</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="週スコア">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root {
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --background-color: #f0f3f5;
            --card-background: #ffffff;
            --text-color: #333333;
            --text-secondary: #7f8c8d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
            padding-bottom: 2rem;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h1 {
            font-size: 1.25rem;
            text-align: center;
            color: var(--primary-color);
            margin: 0.5rem 0;
            font-weight: 700;
        }

        .section {
            background: var(--card-background);
            padding: 1.25rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            box-sizing: border-box;
            width: 100%;
        }

        .section-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .flex-row {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"], input[type="number"] {
            padding: 0.75rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            padding: 0.75rem 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.2s;
            white-space: nowrap;
            box-sizing: border-box;
        }

        button:hover { background-color: #2980b9; }

        .small-btn {
            padding: 0.5rem 0.75rem;
            font-size: 0.9rem;
        }

        .danger-btn {
            background-color: var(--danger-color);
            width: 100%;
            margin-top: 1rem;
        }
        .danger-btn:hover { background-color: #c0392b; }

        .score-display {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }
        .score-display .target {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 400;
        }

        .progress-container {
            background: #e0e0e0;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            overflow: hidden;
            margin: 0.5rem 0;
        }
        .progress-bar {
            background: var(--success-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .task-input-group {
            display: flex;
            gap: 0.75rem;
            width: 100%;
        }
        .task-input-group .input-name { flex: 2; }
        .task-input-group .input-points { flex: 1; }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        li {
            background: #fdfdfd;
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid #f0f0f0;
            box-sizing: border-box;
            width: 100%;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
            gap: 0.5rem;
        }
        .task-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            flex: 1;
            min-width: 0; /* flexアイテム内のテキスト折り返しに必須 */
        }
        .task-title {
            font-size: 1.1rem;
            font-weight: 600;
            word-break: break-word; /* 長い文字のはみ出し防止 */
            line-height: 1.3;
        }
        .task-points {
            color: #e67e22;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .days-container {
            display: flex;
            gap: 6px;
            width: 100%;
            box-sizing: border-box;
        }
        .day-box {
            flex: 1;
            text-align: center;
            font-size: 0.8rem;
            padding: 10px 0;
            background: #eee;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            transition: 0.2s;
            color: #666;
            font-weight: 500;
        }
        .day-box.active {
            background: var(--success-color);
            color: white;
            font-weight: 700;
        }

        .history-item {
            font-size: 0.9rem;
            padding: 0.75rem;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-color);
        }
        .history-item:last-child { border-bottom: none; }
        .history-date { color: var(--text-secondary); }
        .achieved { color: var(--success-color); font-weight: bold; }
        .failed { color: var(--danger-color); }

        /* 完全なスマホ用レイアウト上書き */
        @media (max-width: 600px) {
            body { padding: 0.5rem; }
            .section { padding: 1rem; }
            
            .task-input-group {
                flex-direction: column;
            }
            .task-input-group .input-name,
            .task-input-group .input-points,
            .task-input-group button {
                width: 100%;
                flex: none; /* flex設定をリセット */
            }

            .days-container { gap: 4px; }
            .day-box { font-size: 0.75rem; padding: 12px 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>週間スコア管理</h1>

    <div class="section">
        <div class="section-title">今週の目標</div>
        <div class="flex-row">
            <input type="number" id="targetScoreInput" placeholder="例: 100" min="1">
            <button class="small-btn" onclick="setTarget()">設定</button>
        </div>
        <div class="score-display" style="margin-top: 1rem;">
            <span id="currentScore">0</span> <span class="target">/ <span id="targetScoreDisplay">0</span> 点</span>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">タスク追加</div>
        <div class="task-input-group">
            <input type="text" id="taskName" class="input-name" placeholder="タスク名">
            <input type="number" id="taskPoints" class="input-points" placeholder="点数/回" min="1">
            <button onclick="addTask()">追加</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">今日のタスク</div>
        <ul id="taskList"></ul>
        <button class="danger-btn" onclick="resetWeek()">今週を完了して履歴に保存</button>
    </div>

    <div class="section">
        <div class="section-title">過去の戦績</div>
        <div id="historyList"></div>
        <button style="background: #95a5a6; font-size: 0.75rem; margin-top: 1rem; width: 100%;" onclick="clearHistory()">履歴を全削除</button>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('ServiceWorker registered:', reg))
                .catch(err => console.log('ServiceWorker registration failed:', err));
        });
    }

    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
    let targetScore = localStorage.getItem('targetScore') || 0;
    let history = JSON.parse(localStorage.getItem('taskHistory')) || [];
    const dayNames = ['月', '火', '水', '木', '金', '土', '日'];

    function save() {
        localStorage.setItem('tasks', JSON.stringify(tasks));
        localStorage.setItem('targetScore', targetScore);
        localStorage.setItem('taskHistory', JSON.stringify(history));
        render();
    }

    function setTarget() {
        const val = document.getElementById('targetScoreInput').value;
        if (val > 0) { targetScore = parseInt(val, 10); save(); }
    }

    function addTask() {
        const name = document.getElementById('taskName').value;
        const pts = parseInt(document.getElementById('taskPoints').value, 10);
        if (!name || isNaN(pts) || pts <= 0) return;
        tasks.push({ id: Date.now(), name, points: pts, days: Array(7).fill(false) });
        document.getElementById('taskName').value = '';
        document.getElementById('taskPoints').value = '';
        save();
    }

    function toggleDay(taskId, dayIdx) {
        tasks = tasks.map(t => t.id === taskId ? { ...t, days: t.days.map((d, i) => i === dayIdx ? !d : d) } : t);
        save();
    }

    function deleteTask(id) {
        if (confirm('このタスクを削除するの？')) {
            tasks = tasks.filter(t => t.id !== id);
            save();
        }
    }

    function resetWeek() {
        const currentTotal = calculateScore();
        if (confirm(`今週を終了します。結果を履歴に残すわよ？\nスコア: ${currentTotal} / 目標: ${targetScore}`)) {
            const result = {
                date: new Date().toLocaleDateString(),
                score: currentTotal,
                target: targetScore,
                percent: targetScore > 0 ? Math.round((currentTotal / targetScore) * 100) : 0
            };
            history.unshift(result);
            tasks = tasks.map(t => ({ ...t, days: Array(7).fill(false) }));
            save();
        }
    }

    function clearHistory() {
        if (confirm('履歴を全部消すの？ 本当にいいのね？')) {
            history = [];
            save();
        }
    }

    function calculateScore() {
        return tasks.reduce((acc, t) => acc + (t.days.filter(Boolean).length * t.points), 0);
    }

    function render() {
        document.getElementById('targetScoreDisplay').innerText = targetScore;
        document.getElementById('targetScoreInput').value = targetScore > 0 ? targetScore : '';

        const currentTotal = calculateScore();
        document.getElementById('currentScore').innerText = currentTotal;
        const percent = targetScore > 0 ? Math.min((currentTotal / targetScore) * 100, 100) : 0;
        document.getElementById('progressBar').style.width = percent + '%';

        const list = document.getElementById('taskList');
        list.innerHTML = tasks.map(t => `
            <li>
                <div class="task-header">
                    <div class="task-info">
                        <span class="task-title">${t.name}</span>
                        <span class="task-points">${t.points}点/回</span>
                    </div>
                    <button onclick="deleteTask(${t.id})" style="background:none; color:var(--danger-color); padding: 0 0 0 10px; font-size: 1.2rem; align-self: center;">✖</button>
                </div>
                <div class="days-container">
                    ${t.days.map((d, i) => `<div class="day-box ${d ? 'active' : ''}" onclick="toggleDay(${t.id}, ${i})">${dayNames[i]}</div>`).join('')}
                </div>
            </li>
        `).join('');

        const hList = document.getElementById('historyList');
        hList.innerHTML = history.map(h => `
            <div class="history-item">
                <span class="history-date">${h.date}</span>
                <span>${h.score} <span style="color:var(--text-secondary); font-size:0.8rem;">/ ${h.target}点</span></span>
                <span class="${h.percent >= 100 ? 'achieved' : 'failed'}">${h.percent}%</span>
            </div>
        `).join('');
    }

    render();
</script>
</body>
</html>
