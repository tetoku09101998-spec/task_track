<!DOCTYPE html>
<html lang="ja">
<head>
	<link rel="manifest" href="manifest.json">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<meta name="apple-mobile-web-app-title" content="週スコア">
	<link rel="apple-touch-icon" href="icon.png">

	<script>
	    // Service Workerの登録
	    if ('serviceWorker' in navigator) {
	        navigator.serviceWorker.register('sw.js');
	    }
	</script>
	    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週間タスク＆スコア管理（履歴機能付）</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; color: #333; max-width: 650px; margin: 2rem auto; padding: 1rem; }
        .container { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; text-align: center; color: #2c3e50; }
        .section { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #eee; }
        .flex { display: flex; gap: 0.5rem; }
        input[type="text"], input[type="number"] { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 0.5rem 1rem; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .danger-btn { background-color: #e74c3c; width: 100%; margin-top: 1rem; }
        ul { list-style-type: none; padding: 0; }
        li { background: #f9f9f9; padding: 0.8rem; margin-bottom: 0.8rem; border-radius: 4px; border-left: 4px solid #3498db; }
        .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .days-container { display: flex; gap: 4px; }
        .day-box { flex: 1; text-align: center; font-size: 0.8rem; padding: 5px 0; background: #eee; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .day-box.active { background: #2ecc71; color: white; font-weight: bold; }
        .progress-container { background: #eee; border-radius: 8px; height: 20px; width: 100%; overflow: hidden; margin: 0.5rem 0; }
        .progress-bar { background: #2ecc71; height: 100%; width: 0%; transition: width 0.3s ease; }
        .history-item { font-size: 0.9rem; padding: 0.5rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .achieved { color: #2ecc71; font-weight: bold; }
        .failed { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>週間スコア管理</h1>

    <div class="section">
        <label>目標点数:</label>
        <div class="flex">
            <input type="number" id="targetScoreInput" min="1">
            <button onclick="setTarget()">設定</button>
        </div>
        <div style="text-align: center; margin-top: 10px; font-weight: bold;">
            スコア: <span id="currentScore">0</span> / <span id="targetScoreDisplay">0</span>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <div class="section">
        <div class="flex">
            <input type="text" id="taskName" placeholder="タスク名" style="flex: 2;">
            <input type="number" id="taskPoints" placeholder="点" style="flex: 1;">
            <button onclick="addTask()">追加</button>
        </div>
        <ul id="taskList"></ul>
        <button class="danger-btn" onclick="resetWeek()">今週を完了して履歴に保存</button>
    </div>

    <div class="history-section">
        <h3>過去の戦績</h3>
        <div id="historyList"></div>
        <button style="background: #95a5a6; font-size: 0.7rem; margin-top: 10px;" onclick="clearHistory()">履歴を全削除</button>
    </div>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
    let targetScore = localStorage.getItem('targetScore') || 0;
    let history = JSON.parse(localStorage.getItem('taskHistory')) || [];
    const dayNames = ['月', '火', '水', '木', '金', '土', '日'];

    function save() {
        localStorage.setItem('tasks', JSON.stringify(tasks));
        localStorage.setItem('targetScore', targetScore);
        localStorage.setItem('taskHistory', JSON.stringify(history));
        render();
    }

    function setTarget() {
        const val = document.getElementById('targetScoreInput').value;
        if (val > 0) { targetScore = parseInt(val, 10); save(); }
    }

    function addTask() {
        const name = document.getElementById('taskName').value;
        const pts = parseInt(document.getElementById('taskPoints').value, 10);
        if (!name || isNaN(pts)) return;
        tasks.push({ id: Date.now(), name, points: pts, days: Array(7).fill(false) });
        document.getElementById('taskName').value = '';
        document.getElementById('taskPoints').value = '';
        save();
    }

    function toggleDay(taskId, dayIdx) {
        tasks = tasks.map(t => t.id === taskId ? { ...t, days: t.days.map((d, i) => i === dayIdx ? !d : d) } : t);
        save();
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        save();
    }

    function resetWeek() {
        const currentTotal = calculateScore();
        if (confirm(`今週を終了します。結果を履歴に残すわよ？\nスコア: ${currentTotal} / 目標: ${targetScore}`)) {
            const result = {
                date: new Date().toLocaleDateString(),
                score: currentTotal,
                target: targetScore,
                percent: targetScore > 0 ? Math.round((currentTotal / targetScore) * 100) : 0
            };
            history.unshift(result); // 新しい順
            tasks = tasks.map(t => ({ ...t, days: Array(7).fill(false) }));
            save();
        }
    }

    function clearHistory() {
        if (confirm('履歴を全部消すの？ 本当にいいのね？')) {
            history = [];
            save();
        }
    }

    function calculateScore() {
        return tasks.reduce((acc, t) => acc + (t.days.filter(Boolean).length * t.points), 0);
    }

    function render() {
        document.getElementById('targetScoreDisplay').innerText = targetScore;
        const currentTotal = calculateScore();
        document.getElementById('currentScore').innerText = currentTotal;
        const percent = targetScore > 0 ? Math.min((currentTotal / targetScore) * 100, 100) : 0;
        document.getElementById('progressBar').style.width = percent + '%';

        const list = document.getElementById('taskList');
        list.innerHTML = tasks.map(t => `
            <li>
                <div class="task-header">
                    <strong>${t.name}</strong> (${t.points}点/回)
                    <button onclick="deleteTask(${t.id})" style="background:none; color:#e74c3c;">✖</button>
                </div>
                <div class="days-container">
                    ${t.days.map((d, i) => `<div class="day-box ${d ? 'active' : ''}" onclick="toggleDay(${t.id}, ${i})">${dayNames[i]}</div>`).join('')}
                </div>
            </li>
        `).join('');

        const hList = document.getElementById('historyList');
        hList.innerHTML = history.map(h => `
            <div class="history-item">
                <span>${h.date}</span>
                <span>${h.score} / ${h.target}点</span>
                <span class="${h.percent >= 100 ? 'achieved' : 'failed'}">${h.percent}%達成</span>
            </div>
        `).join('');
    }

    render();
</script>
</body>
</html>
